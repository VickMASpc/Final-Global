<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Access Budget</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <div id="app" class="app-shell"></div>

  <div id="loadingOverlay" class="loading-overlay is-hidden" aria-hidden="true">
    <div class="loading-card">
      <div class="loading-spinner" aria-hidden="true"></div>
      <p>Preparing budget workspace...</p>
    </div>
  </div>

  <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></div>

  <!-- TEMPORARY SCRIPT BUTTON -->
  <button id="runImportBtn" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999; padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-family: inherit; font-weight: 600;">
    Import Extrato
  </button>
  <script type="module">
    import { addRow, updateRow, getBudgetsSnapshot, setBudgets, setCurrentMonth, getCurrentMonth } from "./js/state.js";
    import { saveBudgets } from "./js/storage.js";

    document.getElementById('runImportBtn').addEventListener('click', async () => {
      try {
        const btn = document.getElementById('runImportBtn');
        btn.textContent = "Cleaning up & Importing month by month...";
        
        const now = Date.now();
        const twoHours = 2 * 60 * 60 * 1000;
        let deletedCount = 0;
        
        const snapshot = getBudgetsSnapshot();
        for (const month in snapshot) {
           const monthData = snapshot[month];
           for (const collection of ["income", "fixed", "semFixed", "extra"]) {
              if (monthData[collection]) {
                 monthData[collection] = monthData[collection].filter(item => {
                    const parts = item.id.split('-');
                    let isRecent = false;
                    for (const p of parts) {
                       const ts = parseInt(p);
                       if (ts > 1000000000000 && (now - ts) < twoHours) {
                          isRecent = true;
                       }
                    }
                    if (isRecent) deletedCount++;
                    return !isRecent;
                 });
              }
           }
        }
        setBudgets(snapshot);

        
        const response = await fetch('./itau_extrato_052026.txt');
        const text = await response.text();
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);

        const dateDescRegex = /^(\d{2}\/\d{2}\/\d{4})\s+(.+)/;
        const currencyRegex = /^-?\d{1,3}(?:\.\d{3})*,\d{2}$/;
        
        let pendingItems = [];
        let parsedItems = [];
        
        let startIndex = 0;
        for (let i = 0; i < lines.length; i++) {
          if (lines[i].toLowerCase().includes("valor (r$)")) {
            startIndex = i + 1;
            break;
          }
        }

        for(let i=startIndex; i<lines.length; i++) {
           let line = lines[i];
           
           if (line.toLowerCase().includes("saldo (r$)")) {
              pendingItems = []; 
              continue;
           }
           
           const dateMatch = line.match(dateDescRegex);
           if (dateMatch) {
              pendingItems.push({ desc: dateMatch[2].trim(), date: dateMatch[1] });
           } else if (currencyRegex.test(line)) {
              if (pendingItems.length > 0) {
                 let item = pendingItems.shift();
                 item.amountStr = line;
                 parsedItems.push(item);
              }
           }
        }

        const originalMonth = getCurrentMonth();
        let addedCount = 0;
        
        for (const item of parsedItems) {
          const upperDesc = item.desc.toUpperCase();
          if (upperDesc.includes("DEV") || upperDesc.includes("SALDO DO DIA") || upperDesc.includes("COFRINHOS")) {
             continue;
          }
          
          const [dd, mm, yyyy] = item.date.split('/');
          const monthKey = `${yyyy}-${mm}`;
          setCurrentMonth(monthKey);
          
          let isNegative = item.amountStr.startsWith('-');
          let numStr = item.amountStr.replace('-', '').replace(/\./g, '').replace(',', '.');
          let amount = parseFloat(numStr);
          
          let collection = isNegative ? "extra" : "income"; 
          
          const row = addRow(collection);
          updateRow(collection, row.id, "description", item.desc);
          updateRow(collection, row.id, "amount", String(amount));
          addedCount++;
        }
        
        setCurrentMonth(originalMonth);

        await saveBudgets(getBudgetsSnapshot());
        btn.textContent = `Fixed! Deleted ${deletedCount} wrong items. Added ${addedCount} items. Reloading...`;
        setTimeout(() => location.reload(), 2000);
      } catch (err) {
        console.error(err);
        alert("Error importing: " + err.message);
        document.getElementById('runImportBtn').textContent = "Error";
      }
    });
  </script>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
